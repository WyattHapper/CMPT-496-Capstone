<!DOCTYPE html>
<html>
<head>
    <title>Codebase Analysis System</title>

    <style>
        .page {
            display: none;
        }

        .active {
            display: block;
        }

        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <!-- HOME PAGE -->
    <div id="homePage" class="page active">

        <h1>Codebase Analysis System - CLI</h1>

        <button id="analysisBtn">Run Analysis</button>
        <button id="summaryBtn">View Summaries</button>
        <button id="sourceBtn">View Sources</button>
        <button id="errorBtn">View Errors</button>
        <button id="exitBtn">Exit</button>

    </div>

    <!-- ANALYSIS PAGE -->
    <div id="analysisPage" class="page">

        <h1>Analysis</h1>

        <button id="codebaseAnalysisPipelineBtn">Full Codebase Analysis Pipeline</button>
        <button id="createCodeDatabaseOnlyBtn">Create Code Database Only</button>
        <button id="createJSONSummariesOnlyBtn">Create JSON Summaries Only</button>
        <button id="createSummaryDatabasefromJSONOnlyBtn">Create Summary Database from JSON Only</button>
        <button id="createDirectorySummariesOnlyBtn">Create Directory Summaries Only</button>
        <button id="runBusinessRuleValidationOnlyBtn">Run Business Rule Validation Only</button>
        <button id="runUnitTestGenerationOnlyBtn">Run Unit Test Generation Only</button>
        <button id="runUMLGenerationOnly">Run UML Generation Only</button>
        <button id="analysisBackBtn">Return to Main Menu</button>

        <div id="analysisOutput"></div>

    </div>

    <!-- SUMMARY PAGE -->
    <div id="summaryPage" class="page">

        <h1>Summaries</h1>

        <button id="summaryBackBtn">Back</button>

        <div id="summaryOutput"></div>

    </div>

    <!-- SOURCE PAGE -->
    <div id="sourcePage" class="page">

        <h1>Source Collections</h1>

        <button id="sourceBackBtn">Back</button>

        <div id="sourceOutput"></div>

    </div>

    <!-- ERROR PAGE -->
    <div id="errorPage" class="page">

        <h1>Errors</h1>

        <button id="errorBackBtn">Back</button>

        <div id="errorOutput"></div>

    </div>

    <script src="renderer.js"></script>

</body>
</html>
